<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="30" fill="#0a0a14"/>
  <!-- Brass outer ring -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#cdaa6e" stroke-width="2"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#cdaa6e" stroke-width="0.5" opacity="0.4"/>
  <!-- Seed of Life: 7 circles -->
  <g fill="none" stroke="#cdaa6e" stroke-width="0.8" opacity="0.85">
    <!-- Centre -->
    <circle cx="32" cy="32" r="10"/>
    <!-- 6 petals -->
    <circle cx="32" cy="22" r="10"/>
    <circle cx="40.66" cy="27" r="10"/>
    <circle cx="40.66" cy="37" r="10"/>
    <circle cx="32" cy="42" r="10"/>
    <circle cx="23.34" cy="37" r="10"/>
    <circle cx="23.34" cy="27" r="10"/>
  </g>
  <!-- Centre dot -->
  <circle cx="32" cy="32" r="1.5" fill="#cdaa6e"/>
</svg>
